<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UchidenoIndustry</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      line-height: 1.8;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 60px 20px;
      text-align: center;
      border-bottom: 2px solid #e94560;
    }

    header h1 {
      font-size: 2.2rem;
      color: #fff;
      margin-bottom: 12px;
    }

    header p {
      font-size: 1rem;
      color: #a0a8c0;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    h2 {
      font-size: 1.2rem;
      color: #7ec8e3;
      margin-bottom: 24px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2a2a4a;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 28px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color 0.2s, transform 0.2s;
    }

    .card:hover {
      border-color: #7ec8e3;
      transform: translateY(-2px);
    }

    .card .tag {
      font-size: 0.75rem;
      color: #e94560;
      font-weight: bold;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    .card h3 {
      font-size: 1.1rem;
      color: #fff;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 0.88rem;
      color: #8090a8;
    }

    footer {
      text-align: center;
      padding: 32px;
      color: #4a5068;
      font-size: 0.85rem;
      border-top: 1px solid #2a2a4a;
      margin-top: 60px;
    }
  </style>
</head>
<body>

  <header>
    <h1>UchidenoIndustry</h1>
    <p>Unreal Engine の学習コンテンツをまとめたサイトです。</p>
  </header>

  <main>
    <h2>コンテンツ一覧</h2>
    <div class="card-grid">

      <a class="card" href="GameplayAbilities/">
        <div class="tag">UNREAL ENGINE</div>
        <h3>GameplayAbilities 入門</h3>
        <p>GAS（Gameplay Ability System）をゼロから学ぶチュートリアルです。</p>
      </a>

    </div>
  </main>

  <footer>
    <p>UchidenoIndustry</p>
  </footer>

</body>
</html>
